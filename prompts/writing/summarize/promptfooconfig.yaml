# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "writing-summarize — output quality; no prompt vs naive vs foundation"

providers: file://../../../evals/promptfoo.base.yaml

prompts:
  - {"id":"file://../../../evals/load-prompt.cjs:baseline","label":"no-prompt"}
  - {"id":"file://../../../evals/load-prompt.cjs:legacy","label":"naive"}
  - {"id":"file://../../../evals/load-prompt.cjs:improved","label":"foundation"}

defaultTest:
  vars: {"promptPath":"prompts/writing/summarize/prompt.md","baseline":"{{content}}","legacy":"{{content}}\n\nPlease summarize."}
  assert:
    - {"type":"llm-rubric","value":"file://rubric.txt","provider":"file://../../../evals/judge-primary.yaml"}
    - {"type":"llm-rubric","value":"file://rubric.txt","provider":"file://../../../evals/judge-secondary.yaml"}

tests:
  # Treatment must keep the proposal, the 9-hour/1-hour/80% figures, both risks, and the explicit no-headcount constraint — and must not add conclusions the text doesn't draw.
  - description: "writing-summarize-faithful-001"
    vars: {"content":"Proposal: consolidate our three regional support queues into a single global queue with follow-the-sun staffing. Today, tickets that arrive after a region's business hours wait an average of 9 hours before first response. A single queue would cut first-response time to under 1 hour for 80% of tickets, based on last quarter's volume distribution. Risks: regional teams lose ownership of 'their' customers, and the Spanish-language queue depends on only two agents, so coverage must be solved before cutover. We are not proposing headcount changes in this phase."}
  # Shorter input; treatment must stay faithful and avoid padding a 2-sentence note into an essay.
  - description: "writing-summarize-concise-002"
    vars: {"content":"The Tuesday release is delayed to Thursday because the staging database migration failed twice over the weekend and we want a clean dry run before touching production. No scope changes — same features ship, just two days later."}
