name: eval

# Runs on every PR that touches prompts/skills/eval tooling:
#   1. check  — offline lint of frontmatter + generated indexes (free, always).
#   2. eval   — eval ONLY the changed prompts (promptfoo calls each provider
#               directly — no gateway), compare PR vs base, and post a score
#               comment carrying the sampled ship-gate verdict per asset (quality
#               + margin; see scripts/gate.js). ADVISORY: it does not block the
#               merge (no required checks / branch protection right now). To turn
#               the gate into a hard block, make eval-ci.js exit non-zero when a
#               verdict is FAIL and require this check in branch protection.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY    anthropic:* runners + the primary judge
#   OPENAI_API_KEY       openai:* runners + the secondary judge

on:
  pull_request:
    paths:
      - "prompts/**"
      - "skills/**"
      - "reference/**"
      - "rules/**"
      - "evals/**"
      - "scripts/**"
      - ".github/workflows/eval.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  eval:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to post/update the score comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base branch for the diff + PR-vs-base eval

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Eval changed prompts (PR vs base)
        id: eval
        env:
          BASE_REF: origin/${{ github.base_ref }}
          # promptfoo calls each provider directly — pass the keys it needs.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/eval-ci.js

      - name: Post score comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- prompt-eval-report -->';
            const body = fs.existsSync('eval-comment.md')
              ? fs.readFileSync('eval-comment.md', 'utf8')
              : marker + '\n_Eval did not produce a report (see the job log)._';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
