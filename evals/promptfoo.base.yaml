# Shared runner models — the subjects under test (the BYOM comparison matrix).
# Every asset's promptfooconfig.yaml points its `providers:` at this file, so
# adding a model here runs the whole suite against it.
#
# promptfoo calls each provider DIRECTLY using that provider's API key from the
# environment (.env) — there is no gateway. The provider prefix selects the
# integration and which key it reads:
#   anthropic:messages:<model>  → ANTHROPIC_API_KEY
#   openai:chat:<model>         → OPENAI_API_KEY
#   google:<model>              → GOOGLE_API_KEY   (Gemini / AI Studio)
#   bedrock:<modelId>           → AWS_* credentials
- anthropic:messages:claude-sonnet-4-6
- openai:chat:gpt-5.5
- openai:chat:gpt-5.4-mini
# Uncomment / add lines to test more models side by side:
# - google:gemini-2.5-pro                                     # needs GOOGLE_API_KEY
# AWS Bedrock — use the exact model / inference-profile id enabled in your
# account & region, and install the SDK once: npm i -D @aws-sdk/client-bedrock-runtime
# - bedrock:us.anthropic.claude-3-5-sonnet-20241022-v2:0      # needs AWS_* in .env
