# LiteLLM gateway model map.
#
# Each `model_name` is the string promptfoo asks for via `litellm:chat:<name>`
# (see evals/promptfoo.base.yaml, evals/judge-*.yaml). The `litellm_params.model`
# is the real provider model behind it. Add a row here + a row in the eval
# configs to test another model. Provider keys are read from the environment
# (docker-compose injects them from the repo-root .env).
model_list:
  # Anthropic — runner (promptfoo.base.yaml) + primary judge (judge-primary.yaml)
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
      # Opus 4.8 (like 4.7 / Fable 5) rejects temperature/top_p/top_k with a 400.
      # promptfoo's graders send temperature, so drop it here at the gateway.
      drop_params: true
      additional_drop_params: ["temperature", "top_p", "top_k"]

  # OpenAI — secondary judge (judge-secondary.yaml) + runner (promptfoo.base.yaml)
  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY
  # OpenAI — runner (promptfoo.base.yaml)
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  # Google — optional extra runner. Uncomment the matching line in
  # evals/promptfoo.base.yaml and set GEMINI_API_KEY in the repo-root .env to use it.
  - model_name: gemini/gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # AWS Bedrock — additional models served from your own AWS account. Credentials
  # come from the AWS_* env vars (docker-compose.yml → .env); on Bedrock you also
  # MUST enable each model under Bedrock console → "Model access" in that region.
  # The `model:` value is `bedrock/<modelId-or-inference-profile-id>` — use the
  # EXACT id available in your account & region. List them with:
  #   aws bedrock list-foundation-models --region <region> \
  #     --query 'modelSummaries[].modelId'
  # Newer Claude models on Bedrock are region inference profiles, e.g.
  # `bedrock/us.anthropic.claude-sonnet-4-...`. Add a matching runner line in
  # evals/promptfoo.base.yaml (litellm:chat:<model_name>) to put it in the matrix.
  - model_name: bedrock-claude-sonnet
    litellm_params:
      # ↓ replace with the exact model / inference-profile id enabled for you
      model: bedrock/us.anthropic.claude-3-5-sonnet-20241022-v2:0
      aws_region_name: os.environ/AWS_REGION_NAME
      # Static keys are read from the env automatically; listing them here makes
      # the dependency explicit. Omit them to use an IAM role instead.
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
  # A non-Anthropic Bedrock model, to show "additional models" (uncomment + adjust):
  # - model_name: bedrock-nova-pro
  #   litellm_params:
  #     model: bedrock/amazon.nova-pro-v1:0
  #     aws_region_name: os.environ/AWS_REGION_NAME

# Drop request params a given provider/model doesn't support instead of 400ing.
# LiteLLM knows OpenAI's per-model support (e.g. GPT-5 reasoning models that
# reject `temperature`); the Anthropic Opus-4.8 case is handled explicitly above
# via additional_drop_params, since LiteLLM still treats temperature as supported there.
litellm_settings:
  drop_params: true

# master_key + database_url unlock the dashboard at /ui and virtual-key issuance.
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
