# Local LiteLLM gateway for the promptfoo evals.
#
#   cp ../.env.example ../.env   # from repo root: cp .env.example .env; fill in keys
#   make gateway                 # (from repo root) gateway on http://localhost:4000
#   open http://localhost:4000/ui # dashboard → Virtual Keys → Create New Key
#
# Config is read from the repo-root .env (make gateway passes --env-file ../.env).
# Put the issued virtual key in that same .env as LITELLM_API_KEY, then
# `make eval`. Postgres backs the dashboard + virtual keys; its data persists in
# the named volume across restarts.
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:litellm@db:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in the repo-root .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # AWS Bedrock (optional). Leave blank to use an IAM role / instance profile
      # (boto3 default credential chain) instead of static keys.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    volumes:
      - litellm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  litellm-pgdata:
